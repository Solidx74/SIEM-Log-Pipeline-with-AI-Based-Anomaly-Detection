<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTINEL | Authentication</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0a0b10;
            --panel-bg: #14161f;
            --border-color: #262936;
            --accent-blue: #00f2ff;
            --accent-green: #00ff9d;
            --accent-red: #ff3e3e;
            --text-dim: #8a8d9b;
            --text-bright: #e1e1e6;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, var(--bg-dark) 0%, #05060a 100%);
            font-family: 'JetBrains Mono', monospace;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        
        /* Matrix Rain Background */
        #matrixCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            opacity: 0.15;
        }
        
        /* Scanner Line */
        .scanner-line {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-blue), transparent);
            box-shadow: 0 0 15px var(--accent-blue);
            z-index: 1000;
            animation: scan 6s ease-in-out infinite;
            pointer-events: none;
        }
        
        @keyframes scan {
            0% { top: 0; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100vh; opacity: 0; }
        }
        
        .login-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }
        
        .login-panel {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
        }
        
        .logo {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .logo i {
            font-size: 3rem;
            color: var(--accent-blue);
            text-shadow: 0 0 20px var(--accent-blue);
            margin-bottom: 10px;
        }
        
        .logo h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            color: var(--accent-blue);
            letter-spacing: 2px;
        }
        
        .logo p {
            color: var(--text-dim);
            font-size: 0.8rem;
            margin-top: 5px;
        }
        
        .input-group {
            margin-bottom: 25px;
        }
        
        .input-group label {
            display: block;
            color: var(--text-dim);
            font-size: 0.75rem;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        
        .input-group i {
            margin-right: 8px;
            color: var(--accent-blue);
        }
        
        .input-group input {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-bright);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }
        
        .input-group input:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.3);
        }
        
        .login-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-blue-dark));
            border: none;
            border-radius: 6px;
            color: var(--bg-dark);
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }
        
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 242, 255, 0.4);
        }
        
        .info-text {
            text-align: center;
            color: var(--text-dim);
            font-size: 0.7rem;
            border-top: 1px solid var(--border-color);
            padding-top: 20px;
            margin-top: 10px;
        }
        
        .info-text i {
            color: var(--accent-green);
            margin-right: 5px;
        }
        
        .flash-messages {
            margin-bottom: 20px;
        }
        
        .flash-message {
            padding: 10px;
            border-radius: 6px;
            font-size: 0.8rem;
            margin-bottom: 10px;
            text-align: center;
        }
        
        .flash-message.success {
            background: rgba(0, 255, 157, 0.1);
            border: 1px solid var(--accent-green);
            color: var(--accent-green);
        }
        
        .flash-message.error {
            background: rgba(255, 62, 62, 0.1);
            border: 1px solid var(--accent-red);
            color: var(--accent-red);
        }
        
        .flash-message.warning {
            background: rgba(255, 170, 0, 0.1);
            border: 1px solid var(--accent-yellow);
            color: var(--accent-yellow);
        }
        
        .credentials {
            background: rgba(0, 242, 255, 0.05);
            border-radius: 6px;
            padding: 10px;
            margin-top: 15px;
            font-size: 0.7rem;
        }
        
        .credentials p {
            color: var(--text-dim);
            margin: 5px 0;
        }
        
        .credentials code {
            color: var(--accent-blue);
            background: rgba(0, 0, 0, 0.3);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.7rem;
        }
    </style>
</head>
<body>
    <div class="scanner-line"></div>
    <canvas id="matrixCanvas"></canvas>
    
    <div class="login-container">
        <div class="login-panel">
            <div class="logo">
                <i class="fas fa-shield-virus"></i>
                <h1>SENTINEL</h1>
                <p>AI-Powered SIEM Pipeline</p>
            </div>
            
            <div class="flash-messages">
                {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                        {% for category, message in messages %}
                            <div class="flash-message {{ category }}">{{ message }}</div>
                        {% endfor %}
                    {% endif %}
                {% endwith %}
            </div>
            
            <form method="POST">
                <div class="input-group">
                    <label><i class="fas fa-user"></i> USERNAME</label>
                    <input type="text" name="username" placeholder="Enter username" required autofocus>
                </div>
                
                <div class="input-group">
                    <label><i class="fas fa-lock"></i> PASSWORD</label>
                    <input type="password" name="password" placeholder="Enter password" required>
                </div>
                
                <button type="submit" class="login-btn">
                    <i class="fas fa-sign-in-alt"></i> AUTHENTICATE
                </button>
            </form>
            
            <div class="info-text">
                <i class="fas fa-shield-alt"></i> Secure Access Only
            </div>
            
        </div>
    </div>
    
    <script>
        // Matrix Rain Background
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        
        resizeCanvas();
        
        const matrix = "ABCDEFGHIJKLMNOPQRSTUVWXYZ123456789@#$%^&*()*&^%+-/~{[|`]}";
        const matrixArray = matrix.split("");
        const fontSize = 14;
        const columns = canvas.width / fontSize;
        const drops = [];
        
        for(let x = 0; x < columns; x++) {
            drops[x] = 1;
        }
        
        function drawMatrix() {
            ctx.fillStyle = 'rgba(10, 11, 16, 0.04)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#00f2ff';
            ctx.font = fontSize + 'px "JetBrains Mono"';
            for(let i = 0; i < drops.length; i++) {
                const text = matrixArray[Math.floor(Math.random() * matrixArray.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if(drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }
        
        setInterval(drawMatrix, 50);
        window.addEventListener('resize', () => resizeCanvas());
    </script>
</body>
</html>
